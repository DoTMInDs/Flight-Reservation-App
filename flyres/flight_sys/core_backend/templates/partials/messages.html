{% if messages %}
<div class="container mx-auto px-4 mt-4">
    {% for message in messages %}
    <div class="alert rounded-lg p-4 mb-4 {% if message.tags == 'success' %}bg-green-100 text-green-700 border border-green-300{% elif message.tags == 'error' or message.tags == 'danger' %}bg-red-100 text-red-700 border border-red-300{% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-700 border border-yellow-300{% elif message.tags == 'info' %}bg-blue-100 text-blue-700 border border-blue-300{% else %}bg-gray-100 text-gray-700 border border-gray-300{% endif %}">
        <div class="flex justify-between items-start">
            <div class="flex items-center">
                {% if message.tags == 'success' %}
                <i class="fas fa-check-circle mr-3"></i>
                {% elif message.tags == 'error' or message.tags == 'danger' %}
                <i class="fas fa-exclamation-circle mr-3"></i>
                {% elif message.tags == 'warning' %}
                <i class="fas fa-exclamation-triangle mr-3"></i>
                {% elif message.tags == 'info' %}
                <i class="fas fa-info-circle mr-3"></i>
                {% endif %}
                <div>
                    {{ message }}
                </div>
            </div>
            <button type="button" class="ml-4 text-lg" data-dismiss="alert">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
