{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 to-gray-100 flex flex-col justify-center py-12 sm:px-6 lg:px-8 mt-[-50px]">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <!-- Logo (optional) -->
    <div class="flex justify-center">
      <svg class="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
    </div>
    
    <!-- Header -->
    <h2 class="mt-6 text-center text-3xl font-bold text-gray-900">
      Password Reset Successful
    </h2>
    
    <!-- Description -->
    <div class="mt-4 text-center max-w-md mx-auto">
      <p class="text-sm text-gray-600">
        Your password has been updated successfully. You can now log in with your new password.
      </p>
    </div>
  </div>

  <!-- Card -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-6 shadow-lg rounded-xl sm:px-10 border border-gray-100">
      <!-- Success icon -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
      </div>
      
      <!-- Login button -->
      <div class="mt-6">
        <a href="{% url 'login' %}" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
          Continue to Login
        </a>
      </div>
      
      <!-- Additional help -->
      <div class="mt-4 text-center">
        <p class="text-xs text-gray-500">
          Having trouble? <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Contact support</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
