{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyses - {% block title %}Flight Reservation System{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://kit.fontawesome.com/1566b08547.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        .flight-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #3b82f6;
        }
        
        .flight-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .airline-logo {
            width: 40px;
            height: 40px;
            background-color: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }
        
        .status-hold { background-color: #fef3c7; color: #92400e; }
        .status-ticketed { background-color: #d1fae5; color: #065f46; }
        .status-expired { background-color: #fee2e2; color: #991b1b; }
        
        /* Steps styling */
        .steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        
        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        
        .step:not(:last-child):after {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            width: 100%;
            height: 2px;
            background: #e5e7eb;
            z-index: -1;
        }
        
        .step.completed:not(:last-child):after {
            background: #3b82f6;
        }
        
        .step-number {
            width: 30px;
            height: 30px;
            background: #e5e7eb;
            color: #6b7280;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            position: relative;
            z-index: 2;
        }
        
        .step.completed .step-number {
            background: #3b82f6;
            color: white;
        }
        
        .step.active .step-number {
            background: #3b82f6;
            color: white;
            border: 3px solid #93c5fd;
        }
        
        .step-label {
            font-size: 0.9rem;
            color: #6b7280;
        }
        
        .step.completed .step-label {
            color: #3b82f6;
            font-weight: 500;
        }
        
        .step.active .step-label {
            color: #3b82f6;
            font-weight: bold;
        }
        
        /* Flight line for itinerary */
        .flight-line {
            position: relative;
            height: 1px;
            background: #d1d5db;
            margin: 8px 0;
        }
        
        .flight-line:before {
            content: '';
            position: absolute;
            right: -5px;
            top: -3px;
            width: 0;
            height: 0;
            border-left: 5px solid #d1d5db;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }
    </style>

</head>
<body>
<!-- Header -->
    {% include 'partials/nav.html' %}
    
    <!-- Messages -->
    {% include 'partials/messages.html' %}
    
    <!-- Main Content -->
    <main class="flex-grow">
        <div class="container mx-auto px-4 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <!-- Footer -->
    {% include 'partials/footer.html' %}

     <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom JS -->
    <script>
        // Auto-dismiss alerts after 5 seconds
        $(document).ready(function() {
            setTimeout(function() {
                $('.alert').fadeOut('slow');
            }, 5000);
            
            // Close alert on button click
            $('[data-dismiss="alert"]').click(function() {
                $(this).closest('.alert').fadeOut('slow');
            });
        });
        
        // Dropdown functionality
        document.addEventListener('DOMContentLoaded', function() {
            const dropdowns = document.querySelectorAll('.dropdown');
            dropdowns.forEach(dropdown => {
                const button = dropdown.querySelector('.dropdown-toggle');
                const menu = dropdown.querySelector('.dropdown-menu');
                
                button.addEventListener('click', (e) => {
                    e.preventDefault();
                    menu.classList.toggle('hidden');
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!dropdown.contains(e.target)) {
                        menu.classList.add('hidden');
                    }
                });
            });
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
